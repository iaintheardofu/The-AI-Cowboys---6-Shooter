# Yield Daemon Configuration
# All values have safe defaults. Uncomment and configure for live operation.

[general]
dry_run = true
state_dir = "runtime/yield_daemon"
log_level = "info"
metrics_interval_secs = 30

[zk]
enabled = true
max_concurrent_proofs = 4
min_bid_multiplier = 1.15
ntt_optimization = 0  # 0=scalar, 1=AVX2, 2=AVX-512
montgomery_ifma = true
pippenger_window = 15
# succinct_rpc = "https://prover.succinct.xyz/api/v1"
# gevulot_rpc = "https://api.gevulot.com"

[mev]
enabled = true
chain = "solana"
max_latency_us = 200000
min_profit_threshold = 10000  # lamports
arena_size_bytes = 67108864   # 64MB
kernel_bypass = false
intent_solver = false
# rpc_endpoints = ["https://api.mainnet-beta.solana.com"]
# ws_endpoints = ["wss://atlas-mainnet.helius-rpc.com"]
# jito_block_engine = "https://mainnet.block-engine.jito.wtf"

[mev.amm_programs]
# Raydium V4
# raydium = "675kPX9MHTjS2zt1qfr1NYHuzeLXfQM9H24wFSUt1Mp8"
# Orca Whirlpool
# orca = "whirLbMiicVdio4qvUfM5KAg6Ct8VwpYzGff3uctyCc"
# Meteora DLMM
# meteora = "LBUZKhRxPF3XUpBCjp4YzTKgLccjZhTSDM9YuVaPwxo"

[ml]
enabled = true
subnet_uid = 1
wallet_name = "default"
hotkey_name = "default"
batch_size = 32
background_training = true
precision = "fp16"
# bittensor_endpoint = "wss://entrypoint-finney.opentensor.ai:443"
# model_path = "models/llama-3.1-8b"
# gpu_devices = [0]

[risk]
max_capital_at_risk = 0.05
max_cycle_loss = 0.01
circuit_breaker_threshold = 10
max_stake_fraction = 0.10
# daily_loss_limit = 100.0
